version: '3.8'

services:
  sentinel-bot:
    build: .
    container_name: sentinel-bot
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - POSTGRES_URL=postgresql://sentinel:securepass@postgres/sentinel
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./bot/data:/app/bot/data
    networks:
      - trading-network
    depends_on:
      - redis
      - postgres
    ports:
      - "8080:8080" # Admin API
      - "8000:8000" # Prometheus Metrics

  redis:
    image: redis:alpine
    container_name: sentinel-redis
    restart: unless-stopped
    networks:
      - trading-network

  postgres:
    image: postgres:13
    container_name: sentinel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: securepass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  postgres_data:
