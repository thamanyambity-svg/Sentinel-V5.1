version: '3.8'

services:
  sentinel-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-bot-prod
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
      # In real usage, these secrets should be in .env file or docker secrets
      - POSTGRES_URL=${PROD_POSTGRES_URL:-postgresql://sentinel_prod:prodpass@postgres-prod/sentinel_prod}
      - REDIS_URL=${PROD_REDIS_URL:-redis://redis-prod:6379/0}
      - WHITELIST_IPS=${WHITELIST_IPS}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-prod-secret-key-change-me}
    volumes:
      - ./prod_config:/app/config
      - ./prod_logs:/app/logs
      - ./prod_data:/app/bot/data
    networks:
      - trading-network-prod
    depends_on:
      - redis-prod
      - postgres-prod
    healthcheck:
      test: [ "CMD", "python3", "health_check.py" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - "8080:8080" # Secured Admin API

  redis-prod:
    image: redis:alpine
    container_name: sentinel-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-prodpass}
    networks:
      - trading-network-prod

  postgres-prod:
    image: postgres:13
    container_name: sentinel-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel_prod
      POSTGRES_USER: sentinel_prod
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD:-prodpass}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - trading-network-prod

networks:
  trading-network-prod:
    driver: bridge

volumes:
  postgres_prod_data:
